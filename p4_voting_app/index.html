<html>
	<head>
		<title> Voting App </title>
		<style>
			*{
				font-size:40px;
				text-align:center;
			}
			body{
				background-color:azure;
			}
		</style>	
	</head>
	<body>
		<h1>Age check to Vote </h1>
		
		<form onsubmit="check(event)">
			<input type="number" id="id_age" placeholder="Enter Age"/>
			<br/><br/>
			<input type="submit"	value="Check"/>
		</form>
		<h2 id="id_msg"></h2>

		<script>
			function check(event)
			{
				event.preventDefault();
				let age =document.getElementById("id_age");
				let msg =document.getElementById("id_msg");
				
				if (age.value ==="")
				{
					alert("please enter age");
					msg.textContent="";
					age.focus();
					return;
				}

				let a = parseFloat(age.value);
				if ((a<=0) ||(a>100))	
				{
					alert("age shud be between 1 to 100");
					msg.textContent="";
					age.focus();
					return;
				}
				if (a>=18)
					msg.textContent=" yes u can vote";
				else
					msg.textContent="sorry u can't vote";

			}
		</script>
	</body>
</html>
